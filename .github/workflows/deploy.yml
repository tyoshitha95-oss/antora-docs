name: Deploy Antora Site to GitHub Pages
on:
  push:
    branches: [master]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build Antora site
        run: npx antora antora-playbook.yml
      - name: Add root redirect
        run: |
          echo '<meta http-equiv="refresh" content="0; url=project-name/latest/Dialog/DialogStart.html">' > build/site/index.html
          echo '<meta http-equiv="refresh" content="0; url=Dialog/DialogStart.html">' > build/site/project-name/latest/index.html
          echo '<meta http-equiv="refresh" content="0; url=Dialog/DialogStart.html">' > build/site/project-name/1.0/index.html
          echo '<meta http-equiv="refresh" content="0; url=Dialog/DialogStart.html">' > build/site/project-name/2.0/index.html
          echo '<meta http-equiv="refresh" content="0; url=Dialog/DialogStart.html">' > build/site/project-name/3.0/index.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4